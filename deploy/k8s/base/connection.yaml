apiVersion: apps/v1
kind: Deployment
metadata:
  name: connection
  namespace: gochatroom
  labels:
    app: connection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connection
  template:
    metadata:
      labels:
        app: connection
    spec:
      containers:
        - name: connection
          image: gochatroom/connection:kind
          imagePullPolicy: IfNotPresent
          ports:
            - name: ws
              containerPort: 8081
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: connection
  namespace: gochatroom
  labels:
    app: connection
spec:
  selector:
    app: connection
  ports:
    - name: ws
      port: 8081
      targetPort: ws

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend-test:
    name: backend tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: test
        working-directory: backend
        run: go test ./...

  connection-test:
    name: connection tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: connection/go.mod
          cache: true
          cache-dependency-path: connection/go.sum

      - name: test
        working-directory: connection
        run: go test ./...

  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        working-directory: frontend
        run: npm ci

      - name: build
        working-directory: frontend
        run: npm run build
